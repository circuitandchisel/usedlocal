services:
  - type: web
    name: usedlocal
    runtime: node
    plan: starter
    region: oregon
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    healthCheckPath: /.well-known/oauth-protected-resource
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: APP_NAME
        value: usedlocal
      - key: PORT
        value: 10000
      - key: NPM_TOKEN
        sync: false
      - key: FUNDING_DESTINATION_ATXP
        sync: false
      # Required: Redis for ATXP OAuth + async task queue.
      - key: OAUTH_DB_REDIS_URL
        sync: false
      # Pricing knobs (optional; defaults in src/globals.ts):
      - key: SOURCE_COST_CRAIGSLIST
        sync: false
      - key: SOURCE_COST_KIJIJI
        sync: false
      - key: SOURCE_COST_FACEBOOK
        sync: false
      - key: PRICING_MARGIN_MULTIPLIER
        sync: false
      - key: PRICING_MINIMUM_PRICE
        sync: false
      - key: ENABLED_SOURCES
        sync: false
      - key: FACEBOOK_APIFY_TOKEN
        sync: false
      - key: MAX_CONCURRENT_TASKS
        sync: false
      - key: AUTHORIZATION_SERVER_URL
        sync: false
      - key: POSTHOG_API_KEY
        sync: false
