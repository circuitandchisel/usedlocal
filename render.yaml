services:
  - type: web
    name: usedlocal
    runtime: node
    plan: starter
    region: oregon
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    healthCheckPath: /.well-known/oauth-protected-resource
    autoDeploy: true
    envVars:
      # Most secrets (FUNDING_DESTINATION_ATXP, OAUTH_DB_REDIS_URL, NPM_TOKEN,
      # POSTHOG_API_KEY, NODE_ENV, …) come from the shared "MCP Servers
      # Environment Vars" group, which other MCP services in the workspace
      # also use. Adding/rotating a credential there propagates to every
      # service that inherits the group.
      - fromGroup: MCP Servers Environment Vars

      # Service-specific overrides + tunable knobs. Any of the SOURCE_COST_* /
      # AMAZON_* / PRICING_* knobs can be added here later to override defaults
      # without a code deploy.
      - key: APP_NAME
        value: usedlocal
      - key: PORT
        value: 10000
      - key: KIJIJI_BACKEND
        value: apify
      - key: ENABLED_SOURCES
        value: craigslist,kijiji,ebay,facebook
